<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>DaffaAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --card: #16161f;
  --border: rgba(255,255,255,0.06);
  --accent: #7c6af7;
  --accent2: #a78bfa;
  --text: #e2e2f0;
  --muted: #6b6b8a;
  --user-bubble: #1e1b3a;
  --ai-bubble: #13131c;
  --green: #4ade80;
  --red: #f87171;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}

.header-info { flex: 1; min-width: 0; }
.header-name { font-weight: 600; font-size: 0.95rem; }
.header-status {
  font-size: 0.72rem;
  color: var(--muted);
  display: flex; align-items: center; gap: 5px;
  margin-top: 1px;
}

.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s infinite;
}

.status-dot.offline { background: var(--red); animation: none; }

@keyframes pulse {
  0%, 100% { opacity:1; }
  50% { opacity:.4; }
}

/* ── Messages ── */
.messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  scroll-behavior: smooth;
  overscroll-behavior: contain;
}

.messages::-webkit-scrollbar { width: 3px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg-wrap {
  display: flex;
  gap: 8px;
  animation: msgIn 0.2s ease both;
}

@keyframes msgIn {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}

.msg-wrap.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  flex-shrink: 0;
  margin-top: 4px;
}

.msg-wrap.ai .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg-wrap.user .msg-avatar { background: #2a2a3a; }

.bubble {
  max-width: 82%;
  padding: 10px 13px;
  border-radius: 16px;
  font-size: 0.875rem;
  line-height: 1.6;
  word-break: break-word;
}

.msg-wrap.ai .bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
}

.msg-wrap.user .bubble {
  background: var(--user-bubble);
  border: 1px solid rgba(124,106,247,0.2);
  border-top-right-radius: 4px;
  color: #d4d0ff;
}

/* Code blocks in bubble */
.bubble pre {
  background: #0d0d15;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  user-select: text;
  -webkit-user-select: text;
}

.bubble code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82rem;
  background: rgba(124,106,247,0.15);
  padding: 1px 5px;
  border-radius: 4px;
}

.bubble pre code { background: transparent; padding: 0; }

/* Typing indicator */
.typing-wrap { display: none; }
.typing-wrap.show { display: flex; }

.typing-bubble {
  background: var(--ai-bubble);
  border: 1px solid var(--border);
  border-radius: 16px;
  border-top-left-radius: 4px;
  padding: 12px 16px;
  display: flex; align-items: center; gap: 4px;
}

.typing-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--muted);
  animation: bounce 1.2s infinite;
}
.typing-dot:nth-child(2) { animation-delay: .2s; }
.typing-dot:nth-child(3) { animation-delay: .4s; }

@keyframes bounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-6px); }
}

/* ── Offline overlay ── */
.offline-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 100;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  text-align: center;
  padding: 32px;
}

.offline-overlay.show { display: flex; }

.offline-icon { font-size: 3rem; filter: grayscale(0.5); }
.offline-title { font-size: 1.2rem; font-weight: 600; color: var(--text); }
.offline-sub { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }

.offline-bar {
  width: 100%;
  max-width: 260px;
  height: 4px;
  background: var(--surface);
  border-radius: 2px;
  overflow: hidden;
}

.offline-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  animation: loadbar 2s ease-in-out infinite;
}

@keyframes loadbar {
  0%  { width:0%; margin-left:0; }
  50% { width:70%; margin-left:15%; }
  100%{ width:0%; margin-left:100%; }
}

/* ── Input ── */
.input-area {
  padding: 12px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  gap: 10px;
  flex-shrink: 0;
}

.input-wrap {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 22px;
  display: flex;
  align-items: flex-end;
  padding: 10px 14px;
  gap: 8px;
  transition: border 0.2s;
}

.input-wrap:focus-within { border-color: rgba(124,106,247,0.4); }

textarea {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.875rem;
  resize: none;
  max-height: 120px;
  overflow-y: auto;
  line-height: 1.5;
  user-select: text;
  -webkit-user-select: text;
}

textarea::placeholder { color: var(--muted); }

.send-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  flex-shrink: 0;
}

.send-btn:hover { opacity: 0.9; }
.send-btn:active { transform: scale(0.94); }
.send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

.send-btn svg { width: 18px; height: 18px; fill: white; }

/* New chat btn */
.new-btn {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--card);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--muted);
  font-size: 18px;
  transition: all 0.2s;
  flex-shrink: 0;
}
.new-btn:hover { border-color: var(--accent); color: var(--accent); }

/* Error bubble */
.error-bubble {
  background: rgba(248,113,113,0.08);
  border: 1px solid rgba(248,113,113,0.2);
  color: #fca5a5;
  padding: 10px 13px;
  border-radius: 12px;
  font-size: 0.8rem;
  text-align: center;
}

/* Prevent right-click inspect */
@media (pointer: coarse) {
  body { -webkit-touch-callout: none; }
}
</style>
</head>
<body>

<!-- Offline overlay - tampil saat no internet -->
<div class="offline-overlay" id="offlineOverlay">
  <div class="offline-icon">⚡</div>
  <div class="offline-title">DaffaAI</div>
  <div class="offline-sub">Menyambungkan ke server...<br/>Tunggu sebentar ya</div>
  <div class="offline-bar"><div class="offline-bar-fill"></div></div>
</div>

<!-- Header -->
<div class="header">
  <div class="avatar">🤖</div>
  <div class="header-info">
    <div class="header-name">DaffaAI</div>
    <div class="header-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Online</span>
    </div>
  </div>
</div>

<!-- Messages -->
<div class="messages" id="messages">
  <div class="msg-wrap ai">
    <div class="msg-avatar">🤖</div>
    <div class="bubble">
      Halo! Aku <strong>DaffaAI</strong> — asisten AI buatan Kang Daffa 👋<br/><br/>
      Ada yang bisa aku bantu?
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="msg-wrap ai typing-wrap" id="typingIndicator">
    <div class="msg-avatar">🤖</div>
    <div class="typing-bubble">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <button class="new-btn" onclick="newChat()" title="Chat baru">↺</button>
  <div class="input-wrap">
    <textarea
      id="userInput"
      placeholder="Ketik pesan..."
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
  </div>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">
    <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// ── CONFIG ──
const HF_API_KEY = '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'; // ganti ini
const MODEL = 'mistralai/Mistral-7B-Instruct-v0.3';
const INSTRUCTIONS_URL = '/instructions.txt'; // dari vercel public folder

let systemPrompt = '';
let chatHistory = [];
let isLoading = false;

// ── Anti inspect / DevTools basic protection ──
(function() {
  // Disable right click
  document.addEventListener('contextmenu', e => e.preventDefault());
  // Disable F12 / Ctrl+Shift+I
  document.addEventListener('keydown', e => {
    if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key)) || (e.ctrlKey && e.key === 'U')) {
      e.preventDefault();
    }
  });
  // Detect devtools open (basic)
  const threshold = 160;
  setInterval(() => {
    if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) {
      document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0f;color:#6b6b8a;font-family:monospace">Access Denied</div>';
    }
  }, 1000);
})();

// ── Offline detection ── 
function checkOnline() {
  const overlay = document.getElementById('offlineOverlay');
  const dot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  if (!navigator.onLine) {
    overlay.classList.add('show');
    dot.classList.add('offline');
    statusText.textContent = 'Offline';
  } else {
    overlay.classList.remove('show');
    dot.classList.remove('offline');
    statusText.textContent = 'Online';
  }
}

window.addEventListener('online', checkOnline);
window.addEventListener('offline', checkOnline);
checkOnline();

// Ping berkala untuk update status
setInterval(async () => {
  try {
    const r = await fetch('https://www.gstatic.com/generate_204', { cache: 'no-store', mode: 'no-cors' });
    checkOnline();
  } catch {
    // masih offline
  }
}, 5000);

// ── Load instructions dari file eksternal ──
async function loadInstructions() {
  try {
    const r = await fetch(INSTRUCTIONS_URL + '?v=' + Date.now());
    if (r.ok) {
      systemPrompt = await r.text();
    }
  } catch (e) {
    systemPrompt = 'Kamu adalah asisten AI bernama DaffaAI buatan Kang Daffa. Jawab dalam bahasa Indonesia.';
  }
}

// ── Send message ──
async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;
  if (!navigator.onLine) {
    checkOnline();
    return;
  }

  input.value = '';
  autoResize(input);
  appendMessage('user', text);
  chatHistory.push({ role: 'user', content: text });

  setLoading(true);

  try {
    const reply = await callHF(text);
    chatHistory.push({ role: 'assistant', content: reply });
    appendMessage('ai', reply);
  } catch (e) {
    appendError('Gagal konek ke server. Coba lagi ya 🙏');
    chatHistory.pop(); // hapus user msg dari history kalau gagal
  }

  setLoading(false);
}

// ── Call HuggingFace API ──
async function callHF(userText) {
  // Build prompt dengan history
  let prompt = `<s>[INST] ${systemPrompt}\n\n`;

  // Tambah history (max 6 pesan terakhir biar ga kehabisan token)
  const recentHistory = chatHistory.slice(-6);
  for (let i = 0; i < recentHistory.length - 1; i++) {
    const h = recentHistory[i];
    if (h.role === 'user') prompt += `${h.content} [/INST] `;
    else prompt += `${h.content} </s><s>[INST] `;
  }

  prompt += `${userText} [/INST]`;

  const response = await fetch(
    `https://api-inference.huggingface.co/models/${MODEL}`,
    {
      method: 'POST',
      headers: {
        'Authorization': `Bearer ${HF_API_KEY}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        inputs: prompt,
        parameters: {
          max_new_tokens: 512,
          temperature: 0.7,
          top_p: 0.9,
          do_sample: true,
          return_full_text: false
        }
      })
    }
  );

  if (!response.ok) throw new Error(`HTTP ${response.status}`);

  const data = await response.json();

  if (Array.isArray(data) && data[0]?.generated_text) {
    return cleanResponse(data[0].generated_text);
  }
  if (data.error) throw new Error(data.error);
  throw new Error('Format response tidak dikenal');
}

function cleanResponse(text) {
  // Bersihkan sisa token instruksi
  return text
    .replace(/\[INST\].*?\[\/INST\]/gs, '')
    .replace(/<s>|<\/s>/g, '')
    .replace(/^\s+/, '')
    .trim();
}

// ── UI Helpers ──
function appendMessage(role, text) {
  const messages = document.getElementById('messages');
  const typing = document.getElementById('typingIndicator');

  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = role === 'ai' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatText(text);

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);

  messages.insertBefore(wrap, typing);
  messages.scrollTop = messages.scrollHeight;
}

function appendError(msg) {
  const messages = document.getElementById('messages');
  const typing = document.getElementById('typingIndicator');
  const div = document.createElement('div');
  div.className = 'error-bubble';
  div.textContent = msg;
  messages.insertBefore(div, typing);
  messages.scrollTop = messages.scrollHeight;
}

function formatText(text) {
  // Basic markdown: code blocks, inline code, bold
  return text
    .replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/\n/g, '<br/>');
}

function setLoading(state) {
  isLoading = state;
  const typing = document.getElementById('typingIndicator');
  const btn = document.getElementById('sendBtn');
  typing.classList.toggle('show', state);
  btn.disabled = state;
  if (state) {
    const messages = document.getElementById('messages');
    messages.scrollTop = messages.scrollHeight;
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function newChat() {
  chatHistory = [];
  const messages = document.getElementById('messages');
  const typing = document.getElementById('typingIndicator');
  // Hapus semua pesan kecuali typing indicator
  while (messages.firstChild && messages.firstChild !== typing) {
    messages.removeChild(messages.firstChild);
  }
  // Welcome message lagi
  appendMessage('ai', 'Chat baru dimulai! Ada yang bisa aku bantu? 😊');
}

// ── Init ──
loadInstructions();
</script>
</body>
</html>
